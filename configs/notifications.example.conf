# Server Notification Configuration
# Copy to ~/.server-notifications.conf
# Edit with your credentials

# ============================
# EMAIL CONFIGURATION
# ============================
ENABLE_EMAIL=false
EMAIL_TO="your-email@example.com"
EMAIL_FROM="server@yourdomain.com"
SMTP_SERVER="smtp.gmail.com"
SMTP_PORT=587
SMTP_USER="your-email@gmail.com"
SMTP_PASS="your-app-password"  # Gmail: Use App Password, not regular password

# Gmail App Password: https://myaccount.google.com/apppasswords
# Outlook: https://account.live.com/proofs/AppPassword

# ============================
# TELEGRAM CONFIGURATION
# ============================
ENABLE_TELEGRAM=false
TELEGRAM_BOT_TOKEN="1234567890:ABCdefGHIjklMNOpqrsTUVwxyz"
TELEGRAM_CHAT_ID="123456789"

# How to get Telegram bot:
# 1. Message @BotFather on Telegram
# 2. Send: /newbot
# 3. Follow instructions to get token
# 4. Message your bot
# 5. Visit: https://api.telegram.org/botYOUR_TOKEN/getUpdates
# 6. Find "chat":{"id": YOUR_CHAT_ID}

# ============================
# DISCORD CONFIGURATION
# ============================
ENABLE_DISCORD=false
DISCORD_WEBHOOK="https://discord.com/api/webhooks/123456789/abcdefghijklmnop"

# How to get Discord webhook:
# 1. Go to Server Settings → Integrations → Webhooks
# 2. Create New Webhook
# 3. Copy Webhook URL

# ============================
# NOTIFICATION LEVELS
# ============================
# critical - CPU >85°C, memory >90%, services down
# warning  - CPU >75°C, memory >80%, disk >85%
# info     - Daily reports, status updates
# success  - Backups completed, updates finished
